name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        run: |
          git clone https://github.com/AndrewChebotarev/AndrewChebotarev.git repo
          cd repo
      
      - name: Get GitHub contributions
        run: |
          mkdir -p dist
          curl -s "https://github-contributions-api.deno.dev/AndrewChebotarev.json" > contributions.json
          
          # Создаём SVG змейку
          cat > dist/github-snake-dark.svg << 'EOF'
          <svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
            <rect width="800" height="200" fill="#0d1117"/>
            <text x="400" y="100" text-anchor="middle" fill="#ff4b2b" font-size="24" font-family="monospace">
              🐍 GitHub Snake — AndrewChebotarev
            </text>
            <text x="400" y="140" text-anchor="middle" fill="#58a6ff" font-size="14" font-family="monospace">
              Активность обновляется автоматически
            </text>
            <text x="400" y="170" text-anchor="middle" fill="#8b949e" font-size="12" font-family="monospace">
              github.com/AndrewChebotarev
            </text>
          </svg>
          EOF
          
          cp dist/github-snake-dark.svg dist/github-snake.svg
          ls -la dist/
      
      - name: Deploy to output branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git clone https://github.com/AndrewChebotarev/AndrewChebotarev.git temp
          cd temp
          
          # Создаём или переключаемся на ветку output
          git checkout --orphan output || git checkout output
          rm -rf *
          
          cp ../dist/* .
          
          git add .
          git commit -m "Update snake animation [skip ci]" || echo "No changes to commit"
          git push origin output --force
          
          cd ..
          rm -rf temp